<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WebGL Bus</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        canvas {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body onload="main()">
    <canvas id="webglCanvas" width="500" height="500"></canvas>

    <script>
        function main() {
            const canvas = document.getElementById('webglCanvas');
            const gl = canvas.getContext('webgl');

            if (!gl) {
                alert('WebGL을 지원하지 않는 브라우저입니다.');
                return;
            }

            const vsSource = `
                attribute vec2 a_position;
                void main() {
                    gl_Position = vec4(a_position, 0.0, 1.0);
                }
            `;

            const fsSource = `
                precision mediump float;
                uniform vec4 u_color;
                void main() {
                    gl_FragColor = u_color;
                }
            `;

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);
                    return null;
                }
                return shader;
            }

            const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
            const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            gl.useProgram(program);


            const positionLocation = gl.getAttribLocation(program, "a_position");
            const colorLocation = gl.getUniformLocation(program, "u_color");


            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

 
            function drawRect(x1, y1, x2, y2, color) {
                const vertices = new Float32Array([
                    x1, y1,
                    x2, y1,
                    x1, y2,
                    x1, y2,
                    x2, y1,
                    x2, y2,
                ]);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
                gl.uniform4fv(colorLocation, color);
                gl.drawArrays(gl.TRIANGLES, 0, 6);
            }


            function drawDiamond(cx, cy, size, color) {
                const vertices = new Float32Array([
                    cx, cy + size,       
                    cx + size, cy,      
                    cx, cy - size,       
                    
                    cx, cy + size,       
                    cx, cy - size,       
                    cx - size, cy        
                ]);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
                gl.uniform4fv(colorLocation, color);
                gl.drawArrays(gl.TRIANGLES, 0, 6);
            }



            gl.clearColor(0.8, 0.8, 0.8, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            drawRect(-0.75, -0.2, 0.75, 0.3, [1.0, 0.0, 0.0, 1.0]);
            drawRect(-0.65, 0.0, -0.25, 0.2, [1.0, 1.0, 1.0, 1.0]);
            drawRect(-0.15, 0.0, 0.25, 0.2, [1.0, 1.0, 1.0, 1.0]);
            drawRect(0.35, 0.0, 0.65, 0.2, [1.0, 1.0, 1.0, 1.0]);
            drawDiamond(-0.45, -0.2, 0.18, [0.0, 0.0, 0.0, 1.0]);
            drawDiamond(0.45, -0.2, 0.18, [0.0, 0.0, 0.0, 1.0]);
        }
    </script>
</body>
</html>
